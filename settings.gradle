pluginManagement {
    repositories {
        mavenLocal()
        gradlePluginPortal()
        maven { url = 'https://maven.neoforged.net/releases' }
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        mavenCentral()
        
        // FIXED: Explicitly appended /releases to the URL so Gradle finds the NeoForge 21.1.95 binaries
        maven { url = 'https://maven.neoforged.net/releases' }
        
        maven { url = "https://maven.createmod.net/" } // Serves Create, Flywheel, & Ponder
        maven { url = "https://ithundxr.dev" } // Serves Registrate
    }
}

rootProject.name = 'playerlink'