pluginManagement {
    repositories {
        mavenLocal()
        gradlePluginPortal()
        maven { url = 'https://neoforged.net' }
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

// Fixed: Switched to PREFER_SETTINGS to force Gradle to read these global paths
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        mavenCentral()
        maven { url = "https://maven.createmod.net/" } // Serves Create, Flywheel, & Ponder
        maven { url = "https://ithundxr.dev" } // Serves Registrate
    }
}

rootProject.name = 'playerlink'