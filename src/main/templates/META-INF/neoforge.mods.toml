modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "MIT"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "Player Links [NeoForge 1.21.1]"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "playerlink.mixins.json"

# ── Required dependencies ────────────────────────────────────────────────────

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "create"
type = "required"
versionRange = "${create_version_range}"
ordering = "AFTER"
side = "BOTH"

# ── Optional dependencies ────────────────────────────────────────────────────
# Linked Typewriter support requires Create Simulated (Create Aeronautics).
# The mod works fine without it — typewriter features are simply skipped.

[[dependencies.${mod_id}]]
modId = "simulated"
type = "optional"
versionRange = "[1.0,)"
ordering = "AFTER"
side = "BOTH"
