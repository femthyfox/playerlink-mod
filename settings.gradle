pluginManagement {
    repositories {
        mavenLocal()
        gradlePluginPortal()
        maven { url = 'https://neoforged.net' }
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        mavenCentral()
        
        // ADD THIS EXACT LINE HERE: Allows Gradle to find NeoForge 21.1.95
        maven { url = 'https://neoforged.net' }
        
        maven { url = "https://maven.createmod.net/" } // For Create, Flywheel, & Ponder
        maven { url = "https://ithundxr.dev" } // For Registrate
    }
}

rootProject.name = 'playerlink'